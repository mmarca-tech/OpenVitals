<!-- @startingPoint section="Screens" subtitle="OpenVitals mobile app — dashboard + detail flows" viewport="440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenVitals — App UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #c9ced2; font-family: var(--ov-font-sans); }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px 16px; box-sizing: border-box; }
  .phone {
    width: 400px; height: 848px; background: var(--ov-background); border-radius: 40px;
    box-shadow: 0 18px 50px rgba(18,24,30,.30), 0 0 0 10px #0f1114, 0 0 0 11px #1a1d22;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .statusbar {
    height: 44px; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; font: 600 15px/1 var(--ov-font-sans); color: var(--ov-on-surface);
  }
  .statusbar .icons { display: flex; align-items: center; gap: 6px; }
  .statusbar .material-symbols-outlined { font-size: 18px; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .screen::-webkit-scrollbar { display: none; }
  .homebar { position: absolute; left: 0; right: 0; bottom: 8px; display: flex; justify-content: center; pointer-events: none; }
  .homebar span { width: 134px; height: 5px; border-radius: 3px; background: var(--ov-on-surface); opacity: .5; }
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="statusbar">
      <span id="clock">2:47</span>
      <span class="icons">
        <span class="material-symbols-outlined">network_cell</span>
        <span class="material-symbols-outlined">wifi</span>
        <span class="material-symbols-outlined">battery_horiz_050</span>
      </span>
    </div>
    <div id="app" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>
    <div class="homebar"><span></span></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="DailyReadinessScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel" src="BeverageScreen.jsx"></script>
<script type="text/babel" src="ActivityDetailScreen.jsx"></script>
<script type="text/babel" src="RecordingScreen.jsx"></script>
<script type="text/babel" src="BodyEnergyScreen.jsx"></script>
<script type="text/babel" src="DisplaySettingsScreen.jsx"></script>
<script type="text/babel" src="AchievementsScreen.jsx"></script>
<script type="text/babel" data-presets="react">
  const { BottomNavBar } = window.OpenVitalsDesignSystem_626946;
  class Boundary extends React.Component {
    constructor(p) { super(p); this.state = { err: null }; }
    static getDerivedStateFromError(err) { return { err }; }
    componentDidUpdate(prev) { if (prev.routeKey !== this.props.routeKey && this.state.err) this.setState({ err: null }); }
    render() {
      if (this.state.err) return (
        <div style={{ padding: 24, color: 'var(--ov-on-surface-variant)', fontFamily: 'var(--ov-font-sans)' }}>
          This screen failed to load.
        </div>
      );
      return this.props.children;
    }
  }
  const TAB_ROUTE = { summary: 'dashboard', activity: 'activity', sleep: 'readiness', body: 'bodyenergy' };
  const ROUTE_TAB = { dashboard: 'summary', activity: 'activity', recording: 'activity', readiness: 'sleep', bodyenergy: 'body' };
  function App() {
    const [route, setRoute] = React.useState('dashboard');
    const scrollRef = React.useRef(null);
    const nav = (r) => { setRoute(r); if (scrollRef.current) scrollRef.current.scrollTop = 0; };
    const map = {
      dashboard: window.DashboardScreen,
      readiness: window.DailyReadinessScreen,
      settings: window.SettingsScreen,
      beverage: window.BeverageScreen,
      activity: window.ActivityDetailScreen,
      recording: window.RecordingScreen,
      bodyenergy: window.BodyEnergyScreen,
      display: window.DisplaySettingsScreen,
      achievements: window.AchievementsScreen,
    };
    const Screen = map[route] || window.DashboardScreen;
    const hideNav = route === 'recording';
    return (
      <React.Fragment>
        <div ref={scrollRef} className="screen" style={{ flex: 1, minHeight: 0 }}>
          <Boundary routeKey={route}><Screen nav={nav} /></Boundary>
        </div>
        {hideNav || !BottomNavBar ? null : (
          <BottomNavBar value={ROUTE_TAB[route] || ''} onChange={(t) => nav(TAB_ROUTE[t])} items={[
            { value: 'summary', label: 'Summary', icon: 'dashboard' },
            { value: 'activity', label: 'Activity', icon: 'directions_run' },
            { value: 'sleep', label: 'Sleep', icon: 'bedtime' },
            { value: 'body', label: 'Body', icon: 'monitor_weight' },
          ]} />
        )}
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../../styles.css" />
<style>

  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--ov-surface-container); border-radius: var(--ov-radius-md); padding: 16px; }
  .h { font: var(--ov-weight-bold) var(--ov-title-md-size)/1.3 var(--ov-font-sans); color: var(--ov-on-surface); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
  const { MetricLineChart, MetricBarChart, Sparkline, PeriodHeatmap } = window.OpenVitalsDesignSystem_626946;
  function Demo() {
    return (
      <>

        <div className="card">
          <div className="row">

        <div className="card">

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--ov-background); font-family: var(--ov-font-sans); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
  const { DataConfidenceCard, AchievementBadge, CrossMetricInsightCard, SensorStatusCard } = window.OpenVitalsDesignSystem_626946;
  function Demo() {
    return (
      <>
        <SensorStatusCard batteryPercent={64} activeCount={2} connectedCount={1} onClick={() => {}} />
        <CrossMetricInsightCard title="Sleep and readiness" direction="positive" correlation={62}
          message="On nights you sleep longer, next-day readiness tends to be higher."
          pairedDays={21} accentColor="var(--ov-metric-sleep)" />
        <DataConfidenceCard level="medium" coverage="5 of 7 days tracked (71%)"
          samples="9 records" source="Source: Fitbit" valueKind="Estimated values"
          warnings={["Some buckets have sparse Health Connect data"]}
          accentColor="var(--ov-metric-workout)" />
        <AchievementBadge icon="directions_walk" name="High Tops" unlocked
          requirement="Walk 20,000 steps in a day" current="19,576" target="20,000"
          progress={0.98} status="Almost there" accentColor="var(--ov-metric-steps)" />
        <AchievementBadge icon="straighten" name="Marathon" unlocked
          requirement="Walk 26 mi in total" current="41.2 mi" target="26 mi"
          progress={1} status="Achieved 2 Jul" accentColor="var(--ov-metric-distance)" />
        <AchievementBadge icon="stairs" name="Skyscraper"
          requirement="Climb 100 floors in a day" current="62" target="100"
          progress={0.62} status="Locked" accentColor="var(--ov-metric-floors)" />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>

<!-- @dsCard group="Brand" viewport="700x230" name="App mark & lockup" subtitle="OpenVitals icon + wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ov-background); font-family: var(--ov-font-sans); color: var(--ov-on-surface); }
  .wrap { padding: 28px; display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 18px; }
  .icon { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 2px 8px rgba(26,28,30,.12); }
  .name { font: 700 34px/40px var(--ov-font-sans); color: var(--ov-on-surface); }
  .tag  { font: 400 15px/22px var(--ov-font-sans); color: var(--ov-on-surface-variant); margin-top: 2px; }
  .divider { width: 1px; align-self: stretch; background: var(--ov-outline-variant); margin: 6px 0; }
  .note { max-width: 230px; font: 400 13px/19px var(--ov-font-sans); color: var(--ov-on-surface-variant); }
  .swatches { display: flex; gap: 8px; margin-top: 10px; }
  .sw { width: 26px; height: 26px; border-radius: 7px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lockup">
    <img class="icon" src="../assets/openvitals-icon.png" alt="OpenVitals icon" />
    <div>
      <div class="name">OpenVitals</div>
      <div class="tag">Your health data, on your device</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="note">
    Wordmark is set in Roboto Bold. The mark pairs a teal disc with a peach figure + waveform.
    <div class="swatches">
      <div class="sw" style="background:#5C8FA0"></div>
      <div class="sw" style="background:#F5D9BE"></div>
      <div class="sw" style="background:var(--ov-brand-blue)"></div>
      <div class="sw" style="background:var(--ov-brand-green)"></div>
    </div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x210" name="Dark & AMOLED" subtitle="Static dark scheme — data-theme=dark / amoled" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #101416; font-family: var(--ov-font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px 24px; }
  .sw { border-radius: var(--ov-radius-md); height: 60px; box-sizing: border-box; }
  .name { font: 500 11px/15px var(--ov-font-sans); margin-top: 6px; }
  .hex  { font: 500 10px/14px var(--ov-font-mono); opacity: .7; }
  .dark .name, .dark .hex { color: #E0E3E6; }
</style>
</head>
<body>
<div class="dark" data-theme="dark">
  <div class="row">
    <div><div class="sw" style="background:var(--ov-primary)"></div><div class="name">Primary</div><div class="hex">#82D2F2</div></div>
    <div><div class="sw" style="background:var(--ov-tertiary)"></div><div class="name">Tertiary</div><div class="hex">#80D7BE</div></div>
    <div><div class="sw" style="background:var(--ov-surface)"></div><div class="name">Surface</div><div class="hex">#1A1C1E</div></div>
    <div><div class="sw" style="background:var(--ov-surface-container)"></div><div class="name">Container</div><div class="hex">#2B2D30</div></div>
  </div>
</div>
<div class="dark" data-theme="amoled" style="background:#000">
  <div class="row">
    <div><div class="sw" style="background:var(--ov-surface)"></div><div class="name">AMOLED surface</div><div class="hex">#000000</div></div>
    <div><div class="sw" style="background:var(--ov-surface-container)"></div><div class="name">Container</div><div class="hex">#080808</div></div>
    <div><div class="sw" style="background:var(--ov-surface-container-highest)"></div><div class="name">Highest</div><div class="hex">#181818</div></div>
    <div><div class="sw" style="background:var(--ov-primary)"></div><div class="name">Primary</div><div class="hex">#82D2F2</div></div>
  </div>
</div>
</body>
</html>

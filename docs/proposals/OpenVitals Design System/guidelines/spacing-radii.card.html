<!-- @dsCard group="Spacing" viewport="700x190" name="Corner radii" subtitle="Material 3 shape scale — cards use md (16px)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ov-background); font-family: var(--ov-font-sans); color: var(--ov-on-surface); }
  .grid { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 60px; background: var(--ov-surface-container-high);
         border: 1px solid var(--ov-outline-variant); }
  .name { font: 500 12px/15px var(--ov-font-sans); }
  .val  { font: 500 11px/14px var(--ov-font-mono); color: var(--ov-on-surface-variant); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:var(--ov-radius-xs)"></div><div class="name">xs</div><div class="val">8px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--ov-radius-sm)"></div><div class="name">sm</div><div class="val">12px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--ov-radius-md)"></div><div class="name">md · card</div><div class="val">16px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--ov-radius-lg)"></div><div class="name">lg · pill</div><div class="val">24px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--ov-radius-xl)"></div><div class="name">xl · hero</div><div class="val">32px</div></div>
</div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals & surfaces" subtitle="Cool-neutral surface container tone ladder" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ov-background); font-family: var(--ov-font-sans); }
  .grid { padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--ov-radius-md); height: 72px; border: 1px solid var(--ov-outline-variant); box-sizing: border-box; }
  .name { font: 500 12px/16px var(--ov-font-sans); color: var(--ov-on-surface); margin-top: 8px; }
  .hex  { font: 500 11px/15px var(--ov-font-mono); color: var(--ov-on-surface-variant); }
</style>
</head>
<body>
<div class="grid">
  <div><div class="sw" style="background:var(--ov-surface-container-lowest)"></div><div class="name">Container lowest</div><div class="hex">#FFFFFF</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container-low)"></div><div class="name">Container low</div><div class="hex">#F4F6F8</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container)"></div><div class="name">Container</div><div class="hex">#EFF1F4</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container-high)"></div><div class="name">Container high</div><div class="hex">#E9ECEF</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container-highest)"></div><div class="name">Container highest</div><div class="hex">#E3E6E9</div></div>
  <div><div class="sw" style="background:var(--ov-surface-variant)"></div><div class="name">Surface variant</div><div class="hex">#DCE3E9</div></div>
  <div><div class="sw" style="background:var(--ov-outline-variant)"></div><div class="name">Outline variant</div><div class="hex">#C0C8CE</div></div>
  <div><div class="sw" style="background:var(--ov-on-surface)"></div><div class="name">On surface</div><div class="hex">#1A1C1E</div></div>
</div>
</body>
</html>

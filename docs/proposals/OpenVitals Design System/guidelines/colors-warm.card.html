<!-- @dsCard group="Colors" viewport="700x210" name="Warm dynamic sample" subtitle="Material You instance from screenshots — data-theme=warm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #FCEEE9; font-family: var(--ov-font-sans); }
  .grid { padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--ov-radius-md); height: 84px; box-sizing: border-box; }
  .name { font: 500 12px/16px var(--ov-font-sans); color: #3A2117; margin-top: 8px; }
  .hex  { font: 500 11px/15px var(--ov-font-mono); color: #6B4A3A; }
</style>
</head>
<body data-theme="warm">
<div class="grid">
  <div><div class="sw" style="background:var(--ov-surface)"></div><div class="name">Surface</div><div class="hex">#FCEEE9</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container)"></div><div class="name">Card container</div><div class="hex">#F6DFD4</div></div>
  <div><div class="sw" style="background:var(--ov-surface-container-highest)"></div><div class="name">Container highest</div><div class="hex">#EDCEBE</div></div>
  <div><div class="sw" style="background:var(--ov-primary)"></div><div class="name">Primary (Log)</div><div class="hex">#8A4B2A</div></div>
  <div><div class="sw" style="background:var(--ov-secondary)"></div><div class="name">Secondary (Start)</div><div class="hex">#4A2A1B</div></div>
  <div><div class="sw" style="background:var(--ov-on-surface)"></div><div class="name">On surface</div><div class="hex">#3A2117</div></div>
  <div><div class="sw" style="background:var(--ov-on-surface-variant)"></div><div class="name">On surface variant</div><div class="hex">#6B4A3A</div></div>
  <div><div class="sw" style="background:var(--ov-primary-container)"></div><div class="name">Primary container</div><div class="hex">#FFDBC8</div></div>
</div>
</body>
</html>

<!-- @dsCard group="Type" viewport="700x230" name="Labels & mono" subtitle="labelLarge/Medium/Small (tracked) · Roboto Mono tabular" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ov-background); font-family: var(--ov-font-sans); color: var(--ov-on-surface); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font: 500 11px/16px var(--ov-font-mono); color: var(--ov-on-surface-variant); width: 150px; flex: 0 0 auto; }
  .mono { font: 500 20px/24px var(--ov-font-mono); font-feature-settings: 'tnum'; color: var(--ov-on-surface); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">labelLarge 14 · 500 · .1</span><span class="ov-label-lg">START</span></div>
  <div class="row"><span class="tag">labelMedium 12 · 500 · .5</span><span class="ov-label-md">DISTANCE</span></div>
  <div class="row"><span class="tag">labelSmall 11 · 500 · .5</span><span class="ov-label-sm">HEALTH CONNECT PERMISSIONS</span></div>
  <div class="row"><span class="tag">Roboto Mono · tnum</span><span class="mono">2h 46m · 107 bpm · 18.6 km</span></div>
</div>
</body>
</html>

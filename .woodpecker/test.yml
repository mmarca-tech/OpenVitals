when:
  - event: pull_request
  - event: push
    branch: main

variables:
  - &android_image ghcr.io/cirruslabs/android-sdk:tools

steps:
  - name: unit-tests
    image: *android_image
    commands:
      - set -eu
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew scripts/ci-gradle.sh scripts/ci-android-setup.sh
      - scripts/ci-android-setup.sh
      - scripts/ci-gradle.sh :app:testDebugUnitTest

  - name: app-preflight
    depends_on:
      - unit-tests
    image: *android_image
    commands:
      - set -eu
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew scripts/ci-gradle.sh scripts/ci-android-setup.sh
      - scripts/ci-android-setup.sh
      - scripts/ci-gradle.sh verifyLocalAppPreflight
      - git diff --check

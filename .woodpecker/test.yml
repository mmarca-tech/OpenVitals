when:
  - event: pull_request
  - event: push
    branch: main

variables:
  - &android_image ghcr.io/cirruslabs/android-sdk:tools

steps:
  - name: unit-tests
    image: *android_image
    commands:
      - set -eu
      - scripts/ci-android-gradle.sh verifyCiUnitTest

  - name: app-preflight
    depends_on:
      - unit-tests
    image: *android_image
    commands:
      - set -eu
      - scripts/ci-android-gradle.sh verifyCiPreflight
      - git diff --check

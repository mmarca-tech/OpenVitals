when:
  - event: pull_request
  - event: push
    branch: main

# Pin to our dedicated CI runner, which mounts the persistent pub/Gradle caches.
labels:
  runner: openvitals

variables:
  # cirruslabs publishes one image per Flutter release; 3.44.0 is the newest that
  # exists (a tag it has not built resolves as "manifest unknown"). It carries Dart
  # 3.12.0, which is why pubspec asks for `sdk: ^3.12.0` rather than the 3.12.2 the
  # local toolchain happens to ship. Check https://ghcr.io/v2/cirruslabs/flutter/tags/list
  # before bumping.
  - &flutter_image ghcr.io/cirruslabs/flutter:3.44.0

steps:
  - name: unit-tests
    image: *flutter_image
    commands:
      - set -eu
      # Goldens are engine-sensitive pixels and CI pins a different Flutter patch
      # than the local toolchain, so they are the REFACTOR's safety net rather than
      # CI's gate. See dart_test.yaml and scripts/goldens.sh.
      - scripts/ci-flutter.sh test --exclude-tags golden

  - name: app-preflight
    depends_on:
      - unit-tests
    image: *flutter_image
    commands:
      - set -eu
      - scripts/ci-flutter.sh analyze lib test
      # Translation gate. ARB is the source of truth (Weblate edits it directly), so
      # this is what stops a below-threshold or placeholder-broken locale from merging.
      - dart run tool/verify_l10n.dart
      # F-Droid gate. If Play Services get back into the vendored geolocator fork,
      # F-Droid's scanner deletes the plugin's build.gradle and the build dies with a
      # bare NullPointerException -- so catch it here, on the PR that reintroduced it,
      # not in a release. --offline skips the pub.dev staleness lookup: upstream can
      # publish on a day nobody touched this repo, and that must not redden unrelated
      # PRs. Staleness is a release gate instead (.woodpecker/release.yml).
      - sh scripts/verify-geolocator-fork.sh --offline
      - git diff --check

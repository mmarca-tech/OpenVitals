when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: test
    image: ghcr.io/cirruslabs/android-sdk:36
    commands:
      - set -eu
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew
      - ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug :app:assembleDebug
      - git diff --check

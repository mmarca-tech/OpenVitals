when:
  - event: tag
    ref: refs/tags/v*
  - event: deployment
    evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

steps:
  - name: resolve-release-context
    image: alpine:3.20
    commands:
      - set -eu
      - apk add --no-cache git
      - git fetch --tags --force origin
      - mkdir -p .woodpecker/tmp
      - |
        release_tag="$${CI_COMMIT_TAG:-}"
        if [ -z "$${release_tag}" ]; then
          case "$${CI_COMMIT_REF:-}" in
            refs/tags/v*) release_tag="$${CI_COMMIT_REF#refs/tags/}" ;;
            *)
              release_tag="$$(git tag --points-at "$${CI_COMMIT_SHA}" | grep -E '^v' | tail -n 1 || true)"
              if [ -z "$${release_tag}" ]; then
                echo "Stable release deployment must be started from the successful v* tag pipeline." >&2
                exit 1
              fi
              ;;
          esac
        fi
        if [ "$${CI_PIPELINE_EVENT}" = "deployment" ]; then
          case "$${release_tag}" in
            *-alpha*|*-beta*|*-rc*) echo "Prerelease-suffixed tags cannot be marked stable; use a vX.Y.Z tag." >&2; exit 1 ;;
          esac
        fi
        printf '%s\n' "$${release_tag}" > .woodpecker/tmp/release-tag.txt
      - release_tag="$$(cat .woodpecker/tmp/release-tag.txt)"
      - title_file=".woodpecker/tmp/release-title.txt"
      - notes_file=".woodpecker/tmp/release-notes.md"
      - tag_object_type="$$(git cat-file -t "$${release_tag}")"
      - if [ "$${tag_object_type}" = "tag" ]; then git for-each-ref "refs/tags/$${release_tag}" --format='%(contents)' > "$${notes_file}"; fi
      - |
        if [ ! -s "$${notes_file}" ]; then
          printf '%s\n' \
            "$${release_tag}: OpenVitals" \
            "" \
            "Release candidate built from commit $${CI_COMMIT_SHA}." \
            "" \
            "Distribution flow:" \
            "- Codeberg prerelease with signed APK and signed Android App Bundle assets" \
            "- Codeberg stable release after approved Woodpecker deployment" \
            "- Google Play production upload after approved Woodpecker deployment" \
            "" \
            "Assets:" \
            "- Signed release APK" \
            "- Signed release Android App Bundle" \
            "- SHA-256 checksum" \
            > "$${notes_file}"
        fi
      - "printf '%s\\n' \"$${release_tag}: OpenVitals\" > \"$${title_file}\""

  - name: test
    depends_on:
      - resolve-release-context
    image: ghcr.io/cirruslabs/android-sdk:tools
    commands:
      - set -eu
      - |
        if [ "$${CI_PIPELINE_EVENT}" = "deployment" ] && [ "$${CI_PIPELINE_DEPLOY_TARGET:-}" = "production" ]; then
          echo "Skipping prerelease test suite for production deployment."
          git diff --check
          exit 0
        fi
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - yes | sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - test -d "$${sdk_root}/platforms/android-37.0"
      - test -d "$${sdk_root}/build-tools/37.0.0"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew
      - ./gradlew --no-daemon verifyLocalReleaseChecks
      - git diff --check
    when:
      - event: tag
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

  - name: build-release-artifacts
    depends_on:
      - test
    image: ghcr.io/cirruslabs/android-sdk:tools
    environment:
      OPENVITALS_RELEASE_KEYSTORE_BASE64:
        from_secret: OPENVITALS_RELEASE_KEYSTORE_BASE64
      OPENVITALS_RELEASE_STORE_PASSWORD:
        from_secret: OPENVITALS_RELEASE_STORE_PASSWORD
      OPENVITALS_RELEASE_KEY_ALIAS:
        from_secret: OPENVITALS_RELEASE_KEY_ALIAS
      OPENVITALS_RELEASE_KEY_PASSWORD:
        from_secret: OPENVITALS_RELEASE_KEY_PASSWORD
    commands:
      - set -eu
      - mkdir -p .woodpecker/tmp
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - yes | sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - test -d "$${sdk_root}/platforms/android-37.0"
      - test -d "$${sdk_root}/build-tools/37.0.0"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - keystore_path="$${CI_WORKSPACE}/.woodpecker/tmp/openvitals-release.p12"
      - printf '%s' "$${OPENVITALS_RELEASE_KEYSTORE_BASE64}" | base64 -d > "$${keystore_path}"
      - export OPENVITALS_RELEASE_STORE_FILE="$${keystore_path}"
      - export OPENVITALS_RELEASE_KEY_PASSWORD="$${OPENVITALS_RELEASE_STORE_PASSWORD}"
      - keytool -list -storetype PKCS12 -keystore "$${keystore_path}" -storepass "$${OPENVITALS_RELEASE_STORE_PASSWORD}" -alias "$${OPENVITALS_RELEASE_KEY_ALIAS}" >/dev/null
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew
      - ./gradlew --no-daemon --stacktrace :app:assembleDebug :app:assembleRelease :app:bundleRelease
      - debug_apk_path="$$(find app/build/outputs/apk/debug -maxdepth 1 -name '*.apk' | head -n 1)"
      - apk_path="$$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
      - aab_path="$$(find app/build/outputs/bundle/release -maxdepth 1 -name '*.aab' | head -n 1)"
      - test -n "$${debug_apk_path}"
      - test -n "$${apk_path}"
      - test -n "$${aab_path}"
      - release_tag="$$(cat .woodpecker/tmp/release-tag.txt)"
      - debug_apk=".woodpecker/tmp/OpenVitals-$${release_tag}-debug.apk"
      - release_apk=".woodpecker/tmp/OpenVitals-$${release_tag}.apk"
      - release_aab=".woodpecker/tmp/OpenVitals-$${release_tag}.aab"
      - cp "$${debug_apk_path}" "$${debug_apk}"
      - cp "$${apk_path}" "$${release_apk}"
      - cp "$${aab_path}" "$${release_aab}"
    when:
      - event: tag
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

  - name: publish-play-production
    depends_on:
      - build-release-artifacts
    image: ruby:3.3
    environment:
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_OPT_OUT_USAGE: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64:
        from_secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
    commands:
      - set -eu
      - test -n "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
      - bundle install --jobs 4 --retry 3
      - play_key_path="$${CI_WORKSPACE}/.woodpecker/tmp/google-play-service-account.json"
      - printf '%s' "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 -d > "$${play_key_path}"
      - test -s "$${play_key_path}"
      - release_tag="$$(cat .woodpecker/tmp/release-tag.txt)"
      - test -f ".woodpecker/tmp/OpenVitals-$${release_tag}.aab"
      - version_code="$$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"
      - test -n "$${version_code}"
      - |
        bundle exec fastlane android production \
          json_key:"$${play_key_path}" \
          aab:".woodpecker/tmp/OpenVitals-$${release_tag}.aab" \
          version_code:"$${version_code}"
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

  - name: publish-codeberg-beta
    image: woodpeckerci/plugin-release
    depends_on:
      - build-release-artifacts
    settings:
      api_key:
        from_secret: CODEBERG_RELEASE_API_KEY
      target: main
      files:
        - '.woodpecker/tmp/OpenVitals-*.apk'
        - '.woodpecker/tmp/OpenVitals-*.aab'
      checksum:
        - sha256
      checksum_file: '.woodpecker/tmp/SHA256SUMS.txt'
      checksum_flatten: true
      title: '.woodpecker/tmp/release-title.txt'
      note: '.woodpecker/tmp/release-notes.md'
      prerelease: true
      overwrite: true
    when:
      - event: tag

  - name: publish-codeberg-stable
    depends_on:
      - publish-play-production
    image: alpine:3.20
    environment:
      CODEBERG_RELEASE_API_KEY:
        from_secret: CODEBERG_RELEASE_API_KEY
    commands:
      - set -eu
      - apk add --no-cache curl jq
      - test -n "$${CODEBERG_RELEASE_API_KEY}"
      - release_tag="$$(cat .woodpecker/tmp/release-tag.txt)"
      - api_base="$${CI_FORGE_URL%/}/api/v1/repos/$${CI_REPO}"
      - |
        release_json="$$(curl -fsS \
          -H "Authorization: token $${CODEBERG_RELEASE_API_KEY}" \
          "$${api_base}/releases/tags/$${release_tag}")"
      - release_id="$$(printf '%s' "$${release_json}" | jq -r '.id')"
      - test -n "$${release_id}"
      - test "$${release_id}" != "null"
      - |
        payload="$$(printf '%s' "$${release_json}" | jq \
          '{name: (.name // ""), body: (.body // ""), draft: false, prerelease: false}')"
      - |
        printf '%s' "$${payload}" | curl -fsS -X PATCH \
          -H "Authorization: token $${CODEBERG_RELEASE_API_KEY}" \
          -H "Content-Type: application/json" \
          --data-binary @- \
          "$${api_base}/releases/$${release_id}" >/dev/null
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

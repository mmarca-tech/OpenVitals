when:
  event: tag
  ref: refs/tags/v*

steps:
  - name: test
    image: ghcr.io/cirruslabs/android-sdk:36
    commands:
      - set -eu
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew
      - ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug
      - git diff --check

  - name: build-release-artifacts
    depends_on:
      - test
    image: ghcr.io/cirruslabs/android-sdk:36
    environment:
      OPENVITALS_RELEASE_KEYSTORE_BASE64:
        from_secret: OPENVITALS_RELEASE_KEYSTORE_BASE64
      OPENVITALS_RELEASE_STORE_PASSWORD:
        from_secret: OPENVITALS_RELEASE_STORE_PASSWORD
      OPENVITALS_RELEASE_KEY_ALIAS:
        from_secret: OPENVITALS_RELEASE_KEY_ALIAS
      OPENVITALS_RELEASE_KEY_PASSWORD:
        from_secret: OPENVITALS_RELEASE_KEY_PASSWORD
    commands:
      - set -eu
      - git fetch --tags --force origin
      - mkdir -p .woodpecker/tmp
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - keystore_path="$${CI_WORKSPACE}/.woodpecker/tmp/openvitals-release.p12"
      - printf '%s' "$${OPENVITALS_RELEASE_KEYSTORE_BASE64}" | base64 -d > "$${keystore_path}"
      - export OPENVITALS_RELEASE_STORE_FILE="$${keystore_path}"
      - export OPENVITALS_RELEASE_KEY_PASSWORD="$${OPENVITALS_RELEASE_STORE_PASSWORD}"
      - keytool -list -storetype PKCS12 -keystore "$${keystore_path}" -storepass "$${OPENVITALS_RELEASE_STORE_PASSWORD}" -alias "$${OPENVITALS_RELEASE_KEY_ALIAS}" >/dev/null
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew
      - ./gradlew --no-daemon --stacktrace :app:assembleRelease :app:bundleRelease
      - apk_path="$$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
      - aab_path="$$(find app/build/outputs/bundle/release -maxdepth 1 -name '*.aab' | head -n 1)"
      - test -n "$${apk_path}"
      - test -n "$${aab_path}"
      - release_apk=".woodpecker/tmp/OpenVitals-$${CI_COMMIT_TAG}.apk"
      - release_aab=".woodpecker/tmp/OpenVitals-$${CI_COMMIT_TAG}.aab"
      - cp "$${apk_path}" "$${release_apk}"
      - cp "$${aab_path}" "$${release_aab}"
      - title_file=".woodpecker/tmp/release-title.txt"
      - notes_file=".woodpecker/tmp/release-notes.md"
      - tag_object_type="$$(git cat-file -t "$${CI_COMMIT_TAG}")"
      - if [ "$${tag_object_type}" = "tag" ]; then git for-each-ref "refs/tags/$${CI_COMMIT_TAG}" --format='%(contents)' > "$${notes_file}"; fi
      - |
        if [ ! -s "$${notes_file}" ]; then
          printf '%s\n' \
            "$${CI_COMMIT_TAG}: OpenVitals" \
            "" \
            "Production release built from commit $${CI_COMMIT_SHA}." \
            "" \
            "Assets:" \
            "- Signed release APK" \
            "- Signed release Android App Bundle" \
            "- SHA-256 checksum" \
            > "$${notes_file}"
        fi
      - "printf '%s\\n' \"$${CI_COMMIT_TAG}: OpenVitals\" > \"$${title_file}\""

  - name: publish-play-internal
    depends_on:
      - build-release-artifacts
    image: ruby:3.3
    environment:
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64:
        from_secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
    commands:
      - set -eu
      - test -n "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
      - gem install fastlane -NV
      - play_key_path="$${CI_WORKSPACE}/.woodpecker/tmp/google-play-service-account.json"
      - printf '%s' "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 -d > "$${play_key_path}"
      - test -s "$${play_key_path}"
      - test -f ".woodpecker/tmp/OpenVitals-$${CI_COMMIT_TAG}.aab"
      - |
        fastlane supply \
          --package_name tech.mmarca.openvitals \
          --json_key "$${play_key_path}" \
          --aab ".woodpecker/tmp/OpenVitals-$${CI_COMMIT_TAG}.aab" \
          --track internal \
          --release_status completed \
          --skip_upload_metadata \
          --skip_upload_changelogs \
          --skip_upload_images \
          --skip_upload_screenshots \
          --timeout 600

  - name: create-play-production-draft
    depends_on:
      - publish-play-internal
    image: ruby:3.3
    environment:
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64:
        from_secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
    commands:
      - set -eu
      - test -n "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
      - gem install fastlane -NV
      - play_key_path="$${CI_WORKSPACE}/.woodpecker/tmp/google-play-service-account.json"
      - printf '%s' "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 -d > "$${play_key_path}"
      - test -s "$${play_key_path}"
      - version_code="$$(sed -n 's/.*versionCode = \\([0-9][0-9]*\\).*/\\1/p' app/build.gradle.kts | head -n 1)"
      - test -n "$${version_code}"
      - |
        fastlane supply \
          --package_name tech.mmarca.openvitals \
          --json_key "$${play_key_path}" \
          --track internal \
          --track_promote_to production \
          --track_promote_release_status draft \
          --version_code "$${version_code}" \
          --skip_upload_apk \
          --skip_upload_aab \
          --skip_upload_metadata \
          --skip_upload_changelogs \
          --skip_upload_images \
          --skip_upload_screenshots \
          --timeout 600
    when:
      - evaluate: 'not (CI_COMMIT_TAG contains "-alpha" || CI_COMMIT_TAG contains "-beta" || CI_COMMIT_TAG contains "-rc")'

  - name: publish-release
    image: woodpeckerci/plugin-release
    depends_on:
      - build-release-artifacts
    settings:
      api_key:
        from_secret: CODEBERG_RELEASE_API_KEY
      target: main
      files:
        - '.woodpecker/tmp/OpenVitals-${CI_COMMIT_TAG}.apk'
        - '.woodpecker/tmp/OpenVitals-${CI_COMMIT_TAG}.aab'
      checksum:
        - sha256
      checksum_file: '.woodpecker/tmp/SHA256SUMS.txt'
      checksum_flatten: true
      title: '.woodpecker/tmp/release-title.txt'
      note: '.woodpecker/tmp/release-notes.md'
      overwrite: true
    when:
      - evaluate: 'not (CI_COMMIT_TAG contains "-alpha" || CI_COMMIT_TAG contains "-beta" || CI_COMMIT_TAG contains "-rc")'

  - name: publish-prerelease
    image: woodpeckerci/plugin-release
    depends_on:
      - build-release-artifacts
    settings:
      api_key:
        from_secret: CODEBERG_RELEASE_API_KEY
      target: main
      files:
        - '.woodpecker/tmp/OpenVitals-${CI_COMMIT_TAG}.apk'
        - '.woodpecker/tmp/OpenVitals-${CI_COMMIT_TAG}.aab'
      checksum:
        - sha256
      checksum_file: '.woodpecker/tmp/SHA256SUMS.txt'
      checksum_flatten: true
      title: '.woodpecker/tmp/release-title.txt'
      note: '.woodpecker/tmp/release-notes.md'
      prerelease: true
      overwrite: true
    when:
      - evaluate: 'CI_COMMIT_TAG contains "-alpha" || CI_COMMIT_TAG contains "-beta" || CI_COMMIT_TAG contains "-rc"'

when:
  - event: manual
  - event: cron
    cron: nightly
  - event: tag
    ref: refs/tags/v*
  - event: tag
    ref: refs/tags/V*
  - event: deployment
    evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

steps:
  - name: resolve-release-context
    image: alpine:3.20
    commands:
      - set -eu
      - apk add --no-cache curl git python3
      - git fetch --tags --force origin
      - mkdir -p .woodpecker/tmp
      - apk_abi_filters="armeabi-v7a,arm64-v8a"
      - |
        release_tag="$${CI_COMMIT_TAG:-}"
        if [ "$${CI_PIPELINE_EVENT}" = "cron" ] || [ "$${CI_PIPELINE_EVENT}" = "manual" ]; then
          release_tag="nightly"
        elif [ -z "$${release_tag}" ]; then
          case "$${CI_COMMIT_REF:-}" in
            refs/tags/*) release_tag="$${CI_COMMIT_REF#refs/tags/}" ;;
            *)
              if [ "$${CI_PIPELINE_EVENT}" = "deployment" ]; then
                release_tag="$$(git tag --points-at "$${CI_COMMIT_SHA}" | grep -E '^[vV][0-9]+\.[0-9]+\.[0-9]+$$' | tail -n 1 || true)"
              fi
              ;;
          esac
        fi

        gradle_task=":app:assembleRelease"
        bundle_task=""
        apk_variant_dir="release"
        aab_variant_dir=""
        aab_basename=""
        build_aab="false"
        build_debug_apk="false"
        play_track=""
        version_code=""
        version_name_override=""
        debug_apk_basename=""
        configured_version_code="$$(sed -n 's/.*baseVersionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"
        if [ -z "$${configured_version_code}" ]; then
          echo "Could not read baseVersionCode from app/build.gradle.kts." >&2
          exit 1
        fi
        version_name="$$(sed -n 's/.*baseVersionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
        if ! printf '%s\n' "$${version_name}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Release builds require a numeric baseVersionName, found $${version_name}." >&2
          exit 1
        fi

        if [ "$${release_tag}" = "nightly" ]; then
          release_channel="nightly"
          gradle_task=":app:assembleNightly"
          apk_variant_dir="nightly"
          apk_basename="OpenVitals-nightly.apk"
          bundle_task=":app:bundleNightly"
          aab_variant_dir="nightly"
          aab_basename="OpenVitals-nightly.aab"
          release_title="OpenVitals Nightly"
          prerelease="true"
          build_aab="true"
          build_debug_apk="true"
          play_track="beta"
          debug_apk_basename="OpenVitals-nightly-debug.apk"
          pipeline_number="$${CI_PIPELINE_NUMBER:-1}"
          if ! printf '%s\n' "$${pipeline_number}" | grep -Eq '^[0-9][0-9]*$$'; then
            echo "CI_PIPELINE_NUMBER must be numeric for nightly versionName generation, found $${pipeline_number}." >&2
            exit 1
          fi
          version_code="$$(sh scripts/version-code.sh next --floor "$${configured_version_code}")"
          version_name_override="$${version_name}-nightly.$${pipeline_number}"
        else
          release_channel="release"
          apk_basename="OpenVitals-$${release_tag}.apk"
          release_title="OpenVitals $${release_tag}"
          prerelease="true"

          if [ -z "$${release_tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if ! printf '%s\n' "$${release_tag}" | grep -Eq '^[vV][0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tags must use vX.Y.Z semantic version format, for example v1.8.0 or V1.8.0." >&2
            exit 1
          fi

          if [ "$${version_name}" != "$${release_tag#[vV]}" ]; then
            echo "Release tag $${release_tag} does not match app versionName $${version_name}." >&2
            exit 1
          fi

          if [ "$${CI_PIPELINE_EVENT}" = "deployment" ]; then
            prerelease="false"
            bundle_task=":app:bundleRelease"
            aab_variant_dir="release"
            aab_basename="OpenVitals-$${release_tag}.aab"
            build_aab="true"
            play_track="production"
            version_code="$$(sh scripts/version-code.sh for-tag "$${release_tag}" --floor "$${configured_version_code}")"
          else
            build_debug_apk="true"
            debug_apk_basename="OpenVitals-$${release_tag}-debug.apk"
            previous_configured_version_code="$$(($${configured_version_code} - 1))"
            expected_version_code="$$(sh scripts/version-code.sh next --floor "$${previous_configured_version_code}")"
            if [ "$${expected_version_code}" != "$${configured_version_code}" ]; then
              echo "baseVersionCode $${configured_version_code} is stale; next expected versionCode is $${expected_version_code}." >&2
              exit 1
            fi
            version_code="$${configured_version_code}"
          fi
        fi
      - printf '%s\n' "$${release_title}" > .woodpecker/tmp/release-title.txt
      - |
        notes_file=".woodpecker/tmp/release-notes.md"
        if [ "$${release_channel}" = "release" ]; then
          : > "$${notes_file}"
          if git rev-parse -q --verify "refs/tags/$${release_tag}" >/dev/null; then
            tag_object_type="$$(git cat-file -t "$${release_tag}")"
            if [ "$${tag_object_type}" = "tag" ]; then
              git for-each-ref "refs/tags/$${release_tag}" --format='%(contents)' > "$${notes_file}"
            fi
          fi
          if [ ! -s "$${notes_file}" ]; then
            printf '%s\n' \
              "$${release_title}" \
              "" \
              "Versioned prerelease build from commit $${CI_COMMIT_SHA}." \
              "" \
              "Assets:" \
              "- Signed release APK ($${apk_abi_filters})" \
              > "$${notes_file}"
            if [ "$${build_debug_apk}" = "true" ]; then
              printf '%s\n' "- Signed Debug APK ($${apk_abi_filters})" >> "$${notes_file}"
              printf '%s\n' "- SHA-256 checksums" >> "$${notes_file}"
            else
              printf '%s\n' "- SHA-256 checksum" >> "$${notes_file}"
            fi
          fi
        else
          printf '%s\n' \
            "$${release_title}" \
            "" \
            "Mutable $${release_channel} build from commit $${CI_COMMIT_SHA}." \
            "" \
            "This release keeps a stable download page. The APK and checksum assets are replaced by the next $${release_channel} build." \
            "" \
            "Assets:" \
            "- Signed $${release_channel} APK ($${apk_abi_filters})" \
            > "$${notes_file}"
          if [ "$${build_debug_apk}" = "true" ]; then
            printf '%s\n' "- Signed Debug APK ($${apk_abi_filters})" >> "$${notes_file}"
            printf '%s\n' "- SHA-256 checksums" >> "$${notes_file}"
          else
            printf '%s\n' "- SHA-256 checksum" >> "$${notes_file}"
          fi
        fi
        if [ -n "$${version_code}" ]; then
          {
            printf '\n'
            sh scripts/version-code.sh marker "$${version_code}"
          } >> "$${notes_file}"
        fi
      - |
        {
          printf 'OPENVITALS_RELEASE_CHANNEL=%s\n' "$${release_channel}"
          printf 'OPENVITALS_RELEASE_TAG=%s\n' "$${release_tag}"
          printf 'OPENVITALS_GRADLE_TASK=%s\n' "$${gradle_task}"
          printf 'OPENVITALS_BUNDLE_TASK=%s\n' "$${bundle_task}"
          printf 'OPENVITALS_APK_VARIANT_DIR=%s\n' "$${apk_variant_dir}"
          printf 'OPENVITALS_APK_BASENAME=%s\n' "$${apk_basename}"
          printf 'OPENVITALS_AAB_VARIANT_DIR=%s\n' "$${aab_variant_dir}"
          printf 'OPENVITALS_AAB_BASENAME=%s\n' "$${aab_basename}"
          printf 'OPENVITALS_APK_ABI_FILTERS=%s\n' "$${apk_abi_filters}"
          printf 'OPENVITALS_RELEASE_PRERELEASE=%s\n' "$${prerelease}"
          printf 'OPENVITALS_RELEASE_TARGET=%s\n' "$${CI_COMMIT_SHA}"
          printf 'OPENVITALS_BUILD_AAB=%s\n' "$${build_aab}"
          printf 'OPENVITALS_BUILD_DEBUG_APK=%s\n' "$${build_debug_apk}"
          printf 'OPENVITALS_PLAY_TRACK=%s\n' "$${play_track}"
          printf 'OPENVITALS_VERSION_CODE=%s\n' "$${version_code}"
          printf 'OPENVITALS_VERSION_NAME=%s\n' "$${version_name_override}"
          printf 'OPENVITALS_DEBUG_APK_BASENAME=%s\n' "$${debug_apk_basename}"
        } > .woodpecker/tmp/release-context.env

  - name: test
    depends_on:
      - resolve-release-context
    image: ghcr.io/cirruslabs/android-sdk:tools
    commands:
      - set -eu
      - |
        if [ "$${CI_PIPELINE_EVENT}" = "deployment" ] && [ "$${CI_PIPELINE_DEPLOY_TARGET:-}" = "production" ]; then
          echo "Skipping prerelease test suite for production deployment."
          git diff --check
          exit 0
        fi
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - yes | sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - test -d "$${sdk_root}/platforms/android-37.0"
      - test -d "$${sdk_root}/build-tools/37.0.0"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew scripts/ci-gradle.sh
      - scripts/ci-gradle.sh verifyLocalReleaseChecks
      - git diff --check

  - name: build-apk
    depends_on:
      - test
    image: ghcr.io/cirruslabs/android-sdk:tools
    environment:
      OPENVITALS_RELEASE_KEYSTORE_BASE64:
        from_secret: OPENVITALS_RELEASE_KEYSTORE_BASE64
      OPENVITALS_RELEASE_STORE_PASSWORD:
        from_secret: OPENVITALS_RELEASE_STORE_PASSWORD
      OPENVITALS_RELEASE_KEY_ALIAS:
        from_secret: OPENVITALS_RELEASE_KEY_ALIAS
      OPENVITALS_RELEASE_KEY_PASSWORD:
        from_secret: OPENVITALS_RELEASE_KEY_PASSWORD
      CODEBERG_RELEASE_API_KEY:
        from_secret: CODEBERG_RELEASE_API_KEY
    commands:
      - set -eu
      - . .woodpecker/tmp/release-context.env
      - sdk_root="$${ANDROID_HOME:-$${ANDROID_SDK_ROOT:-}}"
      - test -n "$${sdk_root}"
      - yes | sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - test -d "$${sdk_root}/platforms/android-37.0"
      - test -d "$${sdk_root}/build-tools/37.0.0"
      - printf 'sdk.dir=%s\n' "$${sdk_root}" > local.properties
      - test -n "$${OPENVITALS_RELEASE_KEYSTORE_BASE64}"
      - test -n "$${OPENVITALS_RELEASE_STORE_PASSWORD}"
      - test -n "$${OPENVITALS_RELEASE_KEY_ALIAS}"
      - keystore_path="$${CI_WORKSPACE}/.woodpecker/tmp/openvitals-release.p12"
      - printf '%s' "$${OPENVITALS_RELEASE_KEYSTORE_BASE64}" | base64 -d > "$${keystore_path}"
      - export OPENVITALS_RELEASE_STORE_FILE="$${keystore_path}"
      - export OPENVITALS_RELEASE_KEY_PASSWORD="$${OPENVITALS_RELEASE_STORE_PASSWORD}"
      - keytool -list -storetype PKCS12 -keystore "$${keystore_path}" -storepass "$${OPENVITALS_RELEASE_STORE_PASSWORD}" -alias "$${OPENVITALS_RELEASE_KEY_ALIAS}" >/dev/null
      - export GRADLE_USER_HOME="$${CI_WORKSPACE}/.gradle-ci"
      - export OPENVITALS_SIGN_DEBUG_WITH_RELEASE_KEY=true
      - export OPENVITALS_MINIFY_DEBUG_FOR_CI=true
      - if [ -n "$${OPENVITALS_VERSION_CODE:-}" ]; then export OPENVITALS_VERSION_CODE; fi
      - if [ -n "$${OPENVITALS_VERSION_NAME:-}" ]; then export OPENVITALS_VERSION_NAME; fi
      - test -n "$${OPENVITALS_APK_ABI_FILTERS}"
      - test -f gradle/wrapper/gradle-wrapper.jar
      - chmod +x gradlew scripts/ci-gradle.sh
      - |
        set -- "$${OPENVITALS_GRADLE_TASK}"
        if [ "$${OPENVITALS_BUILD_AAB}" = "true" ]; then
          set -- "$${@}" "$${OPENVITALS_BUNDLE_TASK}"
        fi
        if [ "$${OPENVITALS_BUILD_DEBUG_APK}" = "true" ]; then
          set -- "$${@}" ":app:assembleDebug"
        fi
        env OPENVITALS_APK_ABI_FILTERS="$${OPENVITALS_APK_ABI_FILTERS}" scripts/ci-gradle.sh --stacktrace "$${@}"
      - apk_path="$$(find "app/build/outputs/apk/$${OPENVITALS_APK_VARIANT_DIR}" -maxdepth 1 -name '*.apk' | head -n 1)"
      - test -n "$${apk_path}"
      - artifact_path=".woodpecker/tmp/$${OPENVITALS_APK_BASENAME}"
      - cp "$${apk_path}" "$${artifact_path}"
      - (cd .woodpecker/tmp && sha256sum "$${OPENVITALS_APK_BASENAME}" > "$${OPENVITALS_APK_BASENAME}.sha256")
      - |
        if [ "$${OPENVITALS_BUILD_DEBUG_APK}" = "true" ]; then
          debug_apk_path="$$(find "app/build/outputs/apk/debug" -maxdepth 1 -name '*.apk' | head -n 1)"
          test -n "$${debug_apk_path}"
          cp "$${debug_apk_path}" ".woodpecker/tmp/$${OPENVITALS_DEBUG_APK_BASENAME}"
          (cd .woodpecker/tmp && sha256sum "$${OPENVITALS_DEBUG_APK_BASENAME}" > "$${OPENVITALS_DEBUG_APK_BASENAME}.sha256")
        fi
      - |
        if [ "$${OPENVITALS_BUILD_AAB}" = "true" ]; then
          aab_path="$$(find "app/build/outputs/bundle/$${OPENVITALS_AAB_VARIANT_DIR}" -maxdepth 1 -name '*.aab' | head -n 1)"
          test -n "$${aab_path}"
          cp "$${aab_path}" ".woodpecker/tmp/$${OPENVITALS_AAB_BASENAME}"
        fi
      - |
        if { [ "$${CI_PIPELINE_EVENT}" = "cron" ] || [ "$${CI_PIPELINE_EVENT}" = "manual" ]; } && [ "$${OPENVITALS_RELEASE_CHANNEL}" = "nightly" ]; then
          test -n "$${CODEBERG_RELEASE_API_KEY}"
          if ! command -v git >/dev/null 2>&1 || ! command -v python3 >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache git python3
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends git python3
            else
              echo "Could not install git and python3 in this image." >&2
              exit 1
            fi
          fi
          codeberg_user="$$(python3 -c 'import json, os, urllib.request; forge_url = os.environ.get("CI_FORGE_URL", "https://codeberg.org").rstrip("/"); request = urllib.request.Request(f"{forge_url}/api/v1/user"); request.add_header("Authorization", "token " + os.environ["CODEBERG_RELEASE_API_KEY"]); print(json.load(urllib.request.urlopen(request, timeout=30))["login"])')"
          test -n "$${codeberg_user}"
          askpass_path="$${CI_WORKSPACE}/.woodpecker/tmp/codeberg-git-askpass.sh"
          printf '%s\n' \
            '#!/bin/sh' \
            'case "$1" in' \
            '  *Username*) printf "%s\n" "$${CODEBERG_GIT_USERNAME:?}" ;;' \
            '  *Password*) printf "%s\n" "$${CODEBERG_RELEASE_API_KEY:?}" ;;' \
            '  *) printf "\n" ;;' \
            'esac' \
            > "$${askpass_path}"
          chmod 700 "$${askpass_path}"
          git config user.name "OpenVitals CI"
          git config user.email "ci@openvitals.local"
          git remote set-url origin "$${CI_FORGE_URL%/}/$${CI_REPO}.git"
          GIT_ASKPASS="$${askpass_path}" GIT_TERMINAL_PROMPT=0 CODEBERG_GIT_USERNAME="$${codeberg_user}" git fetch --tags --force origin
          git tag -fa nightly "$${CI_COMMIT_SHA}" -m "OpenVitals nightly $${CI_PIPELINE_NUMBER}"
          GIT_ASKPASS="$${askpass_path}" GIT_TERMINAL_PROMPT=0 CODEBERG_GIT_USERNAME="$${codeberg_user}" git push --force origin refs/tags/nightly
        fi

  - name: publish-play-open-testing
    depends_on:
      - build-apk
    image: ruby:3.3
    environment:
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_OPT_OUT_USAGE: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64:
        from_secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
    commands:
      - set -eu
      - . .woodpecker/tmp/release-context.env
      - test "$${OPENVITALS_PLAY_TRACK}" = "beta"
      - test -n "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
      - bundle install --jobs 4 --retry 3
      - play_key_path="$${CI_WORKSPACE}/.woodpecker/tmp/google-play-service-account.json"
      - printf '%s' "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 -d > "$${play_key_path}"
      - test -s "$${play_key_path}"
      - nightly_aab_path="$${CI_WORKSPACE}/.woodpecker/tmp/$${OPENVITALS_AAB_BASENAME}"
      - test -f "$${nightly_aab_path}"
      - |
        bundle exec fastlane android open_testing \
          json_key:"$${play_key_path}" \
          aab:"$${nightly_aab_path}" \
          version_code:"$${OPENVITALS_VERSION_CODE}"
    when:
      - event: manual
      - event: cron
        cron: nightly

  - name: publish-play-production
    depends_on:
      - build-apk
    image: ruby:3.3
    environment:
      FASTLANE_DISABLE_COLORS: "1"
      FASTLANE_OPT_OUT_USAGE: "1"
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64:
        from_secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64
    commands:
      - set -eu
      - . .woodpecker/tmp/release-context.env
      - test "$${OPENVITALS_PLAY_TRACK}" = "production"
      - test -n "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}"
      - bundle install --jobs 4 --retry 3
      - play_key_path="$${CI_WORKSPACE}/.woodpecker/tmp/google-play-service-account.json"
      - printf '%s' "$${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 -d > "$${play_key_path}"
      - test -s "$${play_key_path}"
      - release_aab_path="$${CI_WORKSPACE}/.woodpecker/tmp/$${OPENVITALS_AAB_BASENAME}"
      - test -f "$${release_aab_path}"
      - |
        bundle exec fastlane android production \
          json_key:"$${play_key_path}" \
          aab:"$${release_aab_path}" \
          version_code:"$${OPENVITALS_VERSION_CODE}"
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

  - name: publish-codeberg-release
    depends_on:
      - build-apk
    image: alpine:3.20
    environment:
      CODEBERG_RELEASE_API_KEY:
        from_secret: CODEBERG_RELEASE_API_KEY
    commands:
      - set -eu
      - apk add --no-cache bash curl jq
      - . .woodpecker/tmp/release-context.env
      - test -n "$${CODEBERG_RELEASE_API_KEY}"
      - chmod +x scripts/publish-codeberg-release.sh
      - |
        if [ "$${OPENVITALS_BUILD_DEBUG_APK}" = "true" ]; then
          scripts/publish-codeberg-release.sh \
            "$${OPENVITALS_RELEASE_TAG}" \
            .woodpecker/tmp/release-title.txt \
            .woodpecker/tmp/release-notes.md \
            "$${OPENVITALS_RELEASE_PRERELEASE}" \
            "$${OPENVITALS_RELEASE_TARGET}" \
            ".woodpecker/tmp/$${OPENVITALS_APK_BASENAME}" \
            ".woodpecker/tmp/$${OPENVITALS_APK_BASENAME}.sha256" \
            ".woodpecker/tmp/$${OPENVITALS_DEBUG_APK_BASENAME}" \
            ".woodpecker/tmp/$${OPENVITALS_DEBUG_APK_BASENAME}.sha256"
        else
          scripts/publish-codeberg-release.sh \
            "$${OPENVITALS_RELEASE_TAG}" \
            .woodpecker/tmp/release-title.txt \
            .woodpecker/tmp/release-notes.md \
            "$${OPENVITALS_RELEASE_PRERELEASE}" \
            "$${OPENVITALS_RELEASE_TARGET}" \
            ".woodpecker/tmp/$${OPENVITALS_APK_BASENAME}" \
            ".woodpecker/tmp/$${OPENVITALS_APK_BASENAME}.sha256"
        fi
    when:
      - event: manual
      - event: cron
        cron: nightly
      - event: tag
        ref: refs/tags/v*
      - event: tag
        ref: refs/tags/V*

  - name: prune-codeberg-releases
    depends_on:
      - publish-codeberg-release
    image: alpine:3.20
    environment:
      CODEBERG_RELEASE_API_KEY:
        from_secret: CODEBERG_RELEASE_API_KEY
    commands:
      - set -eu
      - apk add --no-cache bash curl python3
      - test -n "$${CODEBERG_RELEASE_API_KEY}"
      - chmod +x scripts/prune-codeberg-releases.sh
      - DRY_RUN=false KEEP_RELEASES=9 scripts/prune-codeberg-releases.sh
    when:
      - event: manual
      - event: cron
        cron: nightly

  - name: publish-codeberg-stable
    depends_on:
      - publish-play-production
    image: alpine:3.20
    environment:
      CODEBERG_RELEASE_API_KEY:
        from_secret: CODEBERG_RELEASE_API_KEY
    commands:
      - set -eu
      - apk add --no-cache curl jq
      - . .woodpecker/tmp/release-context.env
      - test -n "$${CODEBERG_RELEASE_API_KEY}"
      - api_base="$${CI_FORGE_URL%/}/api/v1/repos/$${CI_REPO}"
      - |
        release_json="$$(curl -fsS \
          -H "Authorization: token $${CODEBERG_RELEASE_API_KEY}" \
          "$${api_base}/releases/tags/$${OPENVITALS_RELEASE_TAG}")"
      - release_id="$$(printf '%s' "$${release_json}" | jq -r '.id')"
      - test -n "$${release_id}"
      - test "$${release_id}" != "null"
      - |
        payload="$$(printf '%s' "$${release_json}" | jq \
          '{name: (.name // ""), body: (.body // ""), draft: false, prerelease: false}')"
      - |
        printf '%s' "$${payload}" | curl -fsS -X PATCH \
          -H "Authorization: token $${CODEBERG_RELEASE_API_KEY}" \
          -H "Content-Type: application/json" \
          --data-binary @- \
          "$${api_base}/releases/$${release_id}" >/dev/null
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "production"'

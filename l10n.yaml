# Configuration for `flutter gen-l10n`.
#
# The ARB catalogs in `arb-dir` are generated from the Kotlin/Android
# `strings.xml` catalogs by `tool/xml_to_arb.dart`; do not hand-edit them.
# gen-l10n reads them and emits `AppLocalizations` into `output-dir`.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-dir: lib/l10n
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false

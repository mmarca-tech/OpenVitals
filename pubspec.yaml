name: openvitals
description: "Privacy-first Health Connect / HealthKit dashboard, activity tracker, and manual entry app."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
# Bumped by scripts/release.sh, which takes the build number from
# scripts/version-code.sh (a monotonic counter whose source of truth is this repo's
# Codeberg release notes, NOT git). On Android this drives versionName/versionCode;
# on iOS it drives CFBundleShortVersionString/CFBundleVersion.
version: 2.2.2+107030363

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  collection: ^1.19.1
  meta: ^1.18.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  # Pinned to match `flutter_localizations` (SDK), which depends on intl 0.20.2.
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  drift: ^2.34.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.6
  go_router: ^17.3.0
  dynamic_color: ^1.8.1
  flutter_blue_plus: ^2.3.10
  permission_handler: ^12.0.1
  xml: ^6.6.1
  archive: ^4.0.9
  crypto: ^3.0.7
  geolocator: ^14.0.2
  sensors_plus: ^7.1.0
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^22.0.1
  flutter_tts: ^4.2.5
  gpx: ^2.3.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  # Offline base-map rendering (Kotlin MapLibre/Mapsforge parity):
  # vector_map_tiles renders the PMTiles vector packs through flutter_map.
  # The 10.x line draws the tiles on the GPU via flutter_scene; its
  # flutter_scene_importer build hook shells out to CMake >= 3.21, so a host
  # CMake that old (or a snap-bundled one shadowing it) fails the build with
  # "Building native assets failed".
  vector_map_tiles: 10.0.0-beta.2
  # Direct dependency for ThemeReader/Theme (vector_map_tiles' rendering
  # core); kept on the exact line vector_map_tiles 10.0.0-beta.2 pins.
  vector_tile_renderer: 7.0.0-beta.1
  # PMTiles archive reader; feeds a custom VectorTileProvider (the published
  # vector_map_tiles_pmtiles bridge does not support vector_map_tiles 10.x).
  # Pinned to 1.2.x: pmtiles 2.x needs protobuf ^6.0.0 while vector_map_tiles'
  # vector_tile dependency still requires protobuf ^3.0.0, and pmtiles 1.3.0
  # pins archive ^3 against this app's archive ^4.
  pmtiles: '>=1.2.0 <1.3.0'
  # Mapsforge .map reading + software tile rendering with the bundled default
  # render theme (Kotlin MapsforgeThemes.DEFAULT equivalent). Only the split
  # packages are needed — the tiles are bridged into flutter_map, not shown
  # through the mapsforge_flutter map view widget.
  mapsforge_flutter_core: ^4.0.0
  mapsforge_flutter_mapfile: ^4.0.0
  mapsforge_flutter_renderer: ^4.0.0
  mapsforge_flutter_rendertheme: ^4.0.0
  home_widget: ^0.9.3
  android_alarm_manager_plus: ^5.1.0
  timezone: ^0.11.1
  # App-local plugin bridging Flutter to the native AndroidX Health Connect
  # Kotlin client via Pigeon. The Android HealthDataSource
  # (HealthConnectNativeDataSource) is wired onto this plugin; it fully replaces
  # the former `health` package.
  health_connect_native:
    path: packages/health_connect_native
  flutter_timezone: ^5.1.0
  audioplayers: ^6.8.1
  file_selector: ^1.1.0
  # Opens external reference URLs (sleep-score/efficiency "backed links") and
  # the offline-maps guide in the browser, matching the Kotlin app's
  # LocalUriHandler.openUri.
  url_launcher: ^6.3.2
  # Keeps the screen on while an activity recording is live (Kotlin
  # `view.keepScreenOn`). 1.6.x pulls package_info_plus 10, which does not
  # apply the Kotlin Gradle plugin and breaks this AGP 9 build with
  # "cannot find symbol" in GeneratedPluginRegistrant.
  wakelock_plus: ^1.5.0
  # Not used directly: pins wakelock_plus's transitive dependency to the 9.x
  # line that still compiles its Kotlin under AGP 9 (see wakelock_plus above).
  package_info_plus: ^9.0.1
  # Raises the system share sheet for the sanitized diagnostics-log export
  # (Kotlin `DebugLogSharing.kt` / `Intent.createChooser(ACTION_SEND)`).
  # file_selector is a save-picker and cannot share, and reimplementing this
  # natively would force a Kotlin+Swift duplication once iOS lands.
  #
  # share_plus ships its OWN FileProvider (authority
  # `${applicationId}.flutter.share_provider`) and copies any file handed to it
  # into `cacheDir/share_plus/` before granting the URI, so the Kotlin commit's
  # `res/xml/file_paths.xml` + manifest half needs no counterpart in the Android
  # host here.
  #
  # Held at 12.x: the whole 13.x line requires win32 ^6, which drags
  # package_info_plus up to 10.x — the version that does not apply the Kotlin
  # Gradle plugin and breaks this AGP 9 build (see package_info_plus above).
  # 12.0.2 is the newest release that still resolves against win32 ^5.5.3.
  share_plus: ^12.0.2
  # Picks INPUT files (offline map packs, Apple Health exports, FIT/GPX routes).
  #
  # NOT file_selector, which cannot do this job on Android at all: its
  # FileSelectorApiImpl reads the whole picked file into a byte[] and ships it
  # across the Pigeon channel (`new byte[size]` + `readFully`), so a 205 MB map
  # pack threw OutOfMemoryError against a 256 MB heap, and an Apple Health
  # export.zip -- routinely gigabytes -- never stood a chance. file_picker with
  # `withData: false` hands back a PATH and stream-copies, so size stops mattering.
  #
  # file_selector is still used for SAVING (getSaveLocation), which reads nothing.
  # Safe against the AGP-9 trap: file_picker 11 wants win32 ^5.9 and pulls no
  # package_info_plus (see the pins above).
  # Held at 9.x DELIBERATELY. 10.x/11.x rewrote the Android side in Kotlin and skip
  # applying the Kotlin Gradle plugin under AGP 9 without declaring a `kotlin {}` block,
  # so their sources never compile: "cannot find symbol: FilePickerPlugin" in
  # GeneratedPluginRegistrant. 9.x's Android side is pure Java -- no KGP, no trap -- and
  # it still streams the file (8 KB buffer) instead of slurping it. Verify with a real
  # `flutter build apk` before bumping.
  file_picker: ^9.2.3
  # XFile, shared by file_picker and file_selector. Direct, because the pick
  # helpers hand XFiles back to the callers.
  cross_file: ^0.3.4
dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0
  # Generates the Android mipmap / adaptive-icon set and iOS AppIcon.appiconset
  # from assets/icon/openvitals_icon.png. Pure-Dart generator (no platform SDK
  # needed): run `dart run flutter_launcher_icons` to (re)generate.
  flutter_launcher_icons: ^0.14.4
  # Parses the Pigeon contract and the freezed domain factories as SOURCE, so the
  # contract test can compare the two field sets (test/contract/). Already present
  # transitively via build_runner; declared here because we import it directly.
  analyzer: ^12.1.0
  # tool/health_fixture/build.dart only — reads the gitignored Health Connect
  # export to generate the committed test fixture. Never in the app's runtime graph.
  sqlite3: ^3.1.5

# Launcher-icon generation config (consumed by `dart run flutter_launcher_icons`).
# Source icon is the 512x512 Play Store icon copied from the Kotlin app's
# fastlane assets. adaptive_icon_background matches the source adaptive icon's
# @drawable/ic_launcher_background (#FBD6AC).
#
# adaptive_icon_monochrome is what Android 13+ "themed icons" render: the glyph
# as a pure alpha mask, which the launcher recolours to the wallpaper palette.
# WITHOUT it no <monochrome> element is emitted and a themed home screen has
# nothing to theme -- which is how the Flutter port lost it. The source is the
# Kotlin app's own silhouette (res/drawable-nodpi/open_vitals_launcher_monochrome.png,
# recovered from 23c14d0).
#
# adaptive_icon_foreground_inset is 0 because Kotlin drew BOTH layers at
# gravity="fill", and the default 16% was visibly wrong: it shrank the icon to 68%
# of the layer, so the teal disc floated inside a fat #FBD6AC ring instead of
# filling the launcher's mask. The generator applies this one inset to the
# foreground AND the monochrome, so it cannot be tuned per layer -- which is fine,
# because at 0 both land where Kotlin had them. The foreground is the COMPOSITED
# icon (its own background baked in), so it covers the background layer entirely;
# that is Kotlin's design, not an oversight, and it is why no transparent
# foreground glyph is needed.
flutter_launcher_icons:
  image_path: "assets/icon/openvitals_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 26
  adaptive_icon_background: "#FBD6AC"
  adaptive_icon_foreground: "assets/icon/openvitals_icon.png"
  adaptive_icon_foreground_inset: 0
  adaptive_icon_monochrome: "assets/icon/openvitals_icon_monochrome.png"

# sqlparser 0.44.6 made DartPlaceholder a sealed class and removed the `.when`
# helper that drift_dev 2.34.0 still calls, which breaks build_runner. Pin the
# transitive sqlparser below 0.44.6 until drift_dev catches up.
dependency_overrides:
  # geolocator_android pulls in com.google.android.gms:play-services-location.
  # F-Droid's scanner DELETES the plugin's build.gradle when it finds that, and
  # the build then dies with a bare NullPointerException configuring
  # :geolocator_android. The app never used the fused provider anyway (see
  # activityRecordingLocationSettings: forceLocationManager is always true), so
  # the fork just removes it. scripts/verify-geolocator-fork.sh keeps the fork
  # honest -- see packages/geolocator_android/FORK.md.
  geolocator_android:
    path: packages/geolocator_android
  sqlparser: '>=0.44.0 <0.44.6'
  # vector_map_tiles (10.0.0-beta.2) still pins latlong2 ^0.9.1 while
  # flutter_map 8.3.1 already allows <0.11.0. The app (and flutter_map) use
  # latlong2 0.10.x; vector_map_tiles only touches the stable LatLng surface,
  # so forcing 0.10.x is safe. Drop when vector_map_tiles widens its pin.
  latlong2: ^0.10.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Enables Flutter's `gen-l10n` synthesis of `AppLocalizations` from the ARB
  # catalogs in `lib/l10n` (configured by `l10n.yaml`).
  generate: true

  assets:
    # App icon + the wide OpenVitals wordmark shown in the onboarding header,
    # copied from the Kotlin app's `res/drawable-nodpi/open_vitals_logo_wide`.
    - assets/icon/
    # Singing-bowl bells + ambient loops for the mindfulness timer, copied from
    # the Kotlin app's `res/raw`.
    - assets/sounds/
    # Protomaps base style for offline PMTiles rendering, copied verbatim from
    # the Kotlin app's `assets/offline_maps/`.
    - assets/offline_maps/
    # Mapsforge default render theme + its symbol/pattern resources, extracted
    # from the same org.mapsforge:mapsforge-themes:0.25.0 jar the Kotlin app
    # renders with (MapsforgeThemes.DEFAULT). The theme's `jar:` resource refs
    # resolve here via the ImageBundleLoader override in
    # offline_base_map_layer.dart.
    - assets/mapsforge/
    - assets/mapsforge/patterns/
    - assets/mapsforge/symbols/
    - assets/mapsforge/symbols/accommodation/
    - assets/mapsforge/symbols/amenity/
    - assets/mapsforge/symbols/barrier/
    - assets/mapsforge/symbols/custom/
    - assets/mapsforge/symbols/custom/amenity/
    - assets/mapsforge/symbols/custom/money/
    - assets/mapsforge/symbols/custom/tourist/
    - assets/mapsforge/symbols/custom/transport/
    - assets/mapsforge/symbols/education/
    - assets/mapsforge/symbols/food/
    - assets/mapsforge/symbols/health/
    - assets/mapsforge/symbols/money/
    - assets/mapsforge/symbols/place_of_worship/
    - assets/mapsforge/symbols/poi/
    - assets/mapsforge/symbols/shopping/
    - assets/mapsforge/symbols/sport/
    - assets/mapsforge/symbols/tourist/
    - assets/mapsforge/symbols/transport/
    - assets/mapsforge/symbols/water/


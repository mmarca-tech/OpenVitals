// Gradle build for the `health_connect_native` Flutter plugin (Android only).
//
// Built-in Kotlin (Flutter 3.44+ / AGP 9): the plugin does NOT apply the Kotlin
// Gradle Plugin itself — AGP applies KGP automatically for modules with Kotlin
// sources. So only `com.android.library` is declared here, and Kotlin options use
// the top-level `kotlin { compilerOptions {} }` DSL (not the deprecated
// `android.kotlinOptions`). This keeps the plugin off the "applies KGP" warning.
// Repositories (google/mavenCentral) come from the app root's `allprojects` block.
plugins {
    id "com.android.library"
}

group = "tech.mmarca.openvitals.health_connect_native"
version = "1.0"

android {
    namespace = "tech.mmarca.openvitals.health_connect_native"
    // compileSdk 37 matches the host app and the reference: connect-client
    // 1.2.0-alpha04 maps its newer records/permissions against API 37.
    compileSdk = 37

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        // minSdk 26 is required by Health Connect (androidx.health) and matches
        // the host app.
        minSdk = 26
    }

    sourceSets {
        test {
            // ONE fixture, shared. test/fixtures/health_connect/golden.json is
            // generated from the real Health Connect export and committed at the
            // repo root; Tier D (Dart) reads it from there, and this puts the SAME
            // file on the Kotlin test classpath rather than copying it. Two copies
            // of a fixture drift, and a drifted fixture is a test suite that is
            // green about the wrong data.
            resources.srcDirs += "$rootDir/../test/fixtures/health_connect"
        }
    }

    testOptions {
        unitTests {
            // The readers log through android.util.Log, which is an unimplemented
            // stub on the JVM and throws "not mocked" by default. The readers are
            // otherwise pure Kotlin (HealthConnectReaderSupport takes a `() -> String`
            // for diagnostics precisely so it does not need a Context), so making
            // Log a no-op is the only thing standing between them and a plain JVM
            // test. No Robolectric, no emulator.
            returnDefaultValues = true
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
        // MindfulnessSessionRecord + its aggregate metric and feature flag are
        // gated behind an experimental opt-in in connect-client; opt in here so
        // the record converter/aggregate map can reference them.
        freeCompilerArgs.add("-opt-in=androidx.health.connect.client.feature.ExperimentalMindfulnessSessionApi")
    }
}

dependencies {
    // AndroidX Health Connect Kotlin client. Pinned to 1.2.0-alpha04 to match the
    // reference OpenVitals app exactly: this version's AndroidX shim maps newer
    // records (StepsCadence/CyclingPedalingCadence, mindfulness, aggregation) onto
    // the permissions the current platform Health Connect module actually grants.
    // On the older 1.1.0 line, cadence maps to READ_STEPS_CADENCE /
    // READ_CYCLING_PEDALING_CADENCE, which the OS-module HC never exposes as
    // grantable — that left onboarding's Activity Extras stuck at 9/11.
    implementation "androidx.health.connect:connect-client:1.2.0-alpha04"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2"

    // Tier K: the REAL readers, on the JVM, against Google's own fake.
    //
    // connect-testing ships FakeHealthConnectClient, which implements
    // HealthConnectClient for real: an in-memory store, genuine time filtering and
    // paging, and -- crucially -- setPackageName() plus
    // MetadataTestHelper.populatedWithTestValues(id, dataOrigin, lastModifiedTime),
    // so a test can forge WHO wrote a record and WHEN it was last touched. That is
    // what makes multi-writer dedup and the lastModifiedTime tie-break testable at
    // all.
    //
    // It does NOT implement aggregate(): all three aggregate methods throw unless
    // you stub a response. This app aggregates everywhere, so we wrap the fake and
    // compute those three ourselves (AggregatingFakeHealthConnectClient) -- which
    // leaves ONE thing of ours that can be wrong, instead of all of Health Connect.
    testImplementation "androidx.health.connect:connect-testing:1.0.0-alpha03"
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2"
    testImplementation "com.google.truth:truth:1.4.4"
    // Reads the shared fixture. org.json is on the android.jar stub, which
    // returnDefaultValues turns into a no-op that silently returns null for every
    // field -- a JSON parser that parses nothing. Gson is a real one.
    testImplementation "com.google.code.gson:gson:2.11.0"
}

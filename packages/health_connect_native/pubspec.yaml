name: health_connect_native
description: >-
  App-local Flutter plugin that bridges Flutter to the native AndroidX Health
  Connect Kotlin client (androidx.health.connect:connect-client) via Pigeon.
  Android-only for now; iOS HealthKit is a later native bridge.
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.9.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^27.1.0
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: tech.mmarca.openvitals.health_connect_native
        pluginClass: HealthConnectNativePlugin
